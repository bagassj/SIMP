<script type="text/javascript">
	var text1="";
	var today = new Date();
	// var curr_hour = 20;
	// var curr_day = 10;
	// var curr_month = 5;
	var curr_hour = today.getHours();
	var curr_day = today.getDay();
	var curr_month = today.getMonth();
	
	if(curr_day == 10 && curr_month == 5){
		document.getElementById('TeksKiri').classList.remove('fadeInLeft');
		document.getElementById('box-area').className="box-area";
		typingAnimation();
	}
	else if (curr_hour < 4) {
		text1="Have a Good Night";
		document.getElementById('bg-color').classList.add('bg-midnight');
	}
	else if(curr_hour < 11){
		text1="Good Morning You";
		if (curr_hour < 7) {document.getElementById('bg-color').classList.add('bg-morning');}
		else{document.getElementById('bg-color').classList.add('bg-noon');}
	}
	else if(curr_hour < 14){
		text1="Be Happy Today";
		document.getElementById('bg-color').classList.add('bg-noon');
	}
	else if(curr_hour < 17){
		text1="Good Afternoon Dear";
		document.getElementById('bg-color').classList.add('bg-afternoon');
	}
	else if(curr_hour < 20){
		text1="Good Afternoon, Take a Rest";
		document.getElementById('bg-color').classList.add('bg-night');
	}
	else if(curr_hour < 24){
		text1="Time to Sleep, Good Night";
		document.getElementById('bg-color').classList.add('bg-midnight');
	}
	document.getElementById('TeksKiri').innerHTML= text1;
	function typingAnimation(){
		var charText='Happy Birthday';
		var i = 0;
		var speed = 50;

		setTimeout(
		function typeWriter(){
			if (i < charText.length) {
				document.getElementById('TeksKiri').innerHTML += charText.charAt(i);
				i++;
				setTimeout(typeWriter, speed);
			}
		}
		, 3500);
	}
</script>
<script type="text/javascript">
		var today = new Date();
		var curr_hour = today.getHours();
		var curr_minute = today.getMinutes();
		var curr_day = today.getDay();
		var curr_month = today.getMonth();

		if(curr_day == 10 && curr_month == 5){
			document.getElementById("TeksKanan").innerHTML = "";
		}
		else if(curr_hour >18 && curr_hour <22){
			malam(0);
		}
