<script type="text/javascript">
	var text1="";
	var today = new Date();
	var curr_hour = today.getHours();
	var curr_day = today.getDay();
	var curr_month = today.getMonth();
	
	if(curr_day == 10 && curr_month == 5){
		document.getElementById('TeksKiri').classList.remove('fadeInLeft');
		document.getElementById('box-area').className="box-area";
		typingAnimation();
	}
	else if (curr_hour < 11) {
		text1="Good Morning";
	}
	else if(curr_hour < 15){
		text1="Good Afternoon";
	}
	else if(curr_hour < 19){
		text1="Good Evening";
	}
	else if(curr_hour < 24){
		text1="Good Night";
	}
	document.getElementById('TeksKiri').innerHTML= text1;
	function typingAnimation(){
		var charText='Happy Birthday';
		var i = 0;
		var speed = 50;

		setTimeout(
		function typeWriter(){
			if (i < charText.length) {
				document.getElementById('TeksKiri').innerHTML += charText.charAt(i);
				i++;
				setTimeout(typeWriter, speed);
			}
		}
		, 3500);
	}
</script>
<script type="text/javascript">
		var text2=[
		'Ayo Bangun',
		'Jangan lupa sarapan',
		'Mandi loh',
		'Makan siangnya jangan lupa',
		'Kalo ngantuk tidur',
		'Olahraga biar sehat',
		'Mandi loh',
		'Jangan lupa makan malam',
		'Tidur nyenyak',
		'Sampai Besok'];
		var max;
		var min;
		var today = new Date();
		var curr_hour = today.getHours();
		var curr_day = today.getDay();
		var curr_month = today.getMonth();

		if(curr_day == 10 && curr_month == 5){
			document.getElementById("TeksKanan").innerHTML = "";
		}
		else if (curr_hour >= 4 && curr_hour < 11) {
			min=0;
			max=3;
			textSequence(0);
		}
		else if(curr_hour >= 11 && curr_hour < 15){
			min=3;
			max=5;
			textSequence(3);
		}
		else if(curr_hour >= 15 && curr_hour < 18){
			min=5;
			max=7;
			textSequence(5);
		}
		else if(curr_hour >= 18 && curr_hour < 24){
			min=7;
			max=10;
			textSequence(7);
		}
		function textSequence(i) {

	        if (max > i) {
	            setTimeout(function() {
	                document.getElementById("TeksKanan").innerHTML = text2[i];
	                textSequence(++i);
	            }, 3000); // (in milliseconds)

	        } else if (max == i) {
	            textSequence(min);
	        }

	    }
</script>
